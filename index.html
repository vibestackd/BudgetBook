<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>가계부</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; padding: 2rem 1rem; }
  .wrap { max-width: 780px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; color: #1a1a18; }

  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .card { background: #fff; border-radius: 10px; padding: 0.9rem 1.1rem; border: 0.5px solid #e0dfd8; }
  .card-label { font-size: 12px; color: #888780; margin-bottom: 5px; }
  .card-value { font-size: 20px; font-weight: 500; color: #1a1a18; }
  .card-value.danger { color: #a32d2d; }

  .form-section { background: #fff; border-radius: 12px; border: 0.5px solid #e0dfd8; padding: 1.2rem; margin-bottom: 1.25rem; }
  .form-grid { display: grid; grid-template-columns: 130px 1fr 140px 110px; gap: 8px; margin-bottom: 10px; }
  .form-grid input, .form-grid select {
    height: 38px; padding: 0 10px; font-size: 14px;
    border: 0.5px solid #ccc; border-radius: 8px;
    background: #fafaf8; color: #1a1a18; width: 100%;
  }
  .form-grid input:focus, .form-grid select:focus { outline: none; border-color: #888; }
  label.field-label { font-size: 12px; color: #888780; display: block; margin-bottom: 3px; }
  .btn-add {
    width: 100%; height: 38px; font-size: 14px; font-weight: 500;
    border-radius: 8px; background: #1a1a18; color: #fff;
    border: none; cursor: pointer; transition: opacity 0.15s;
  }
  .btn-add:hover { opacity: 0.82; }

  .filter-row { display: flex; gap: 8px; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
  .filter-row span { font-size: 13px; color: #888780; }
  .filter-row select { height: 32px; font-size: 13px; padding: 0 8px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #1a1a18; }

  .table-wrap { background: #fff; border-radius: 12px; border: 0.5px solid #e0dfd8; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; table-layout: fixed; }
  thead { background: #f5f5f3; }
  th { padding: 10px 14px; text-align: left; font-weight: 500; color: #888780; font-size: 12px; }
  td { padding: 11px 14px; color: #1a1a18; border-top: 0.5px solid #e8e8e4; }
  .col-date { width: 110px; }
  .col-cat  { width: 80px; }
  .col-item { }
  .col-amt  { width: 120px; text-align: right; }
  .col-del  { width: 48px; text-align: center; }
  td.amount { text-align: right; font-variant-numeric: tabular-nums; }
  tr:hover td { background: #fafaf8; }

  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 8px; font-weight: 500; }
  .badge-식비  { background: #EAF3DE; color: #3B6D11; }
  .badge-교통  { background: #E6F1FB; color: #185FA5; }
  .badge-쇼핑  { background: #FBEAF0; color: #993556; }
  .badge-의료  { background: #FAECE7; color: #993C1D; }
  .badge-문화  { background: #EEEDFE; color: #534AB7; }
  .badge-기타  { background: #f0efe8; color: #5F5E5A; }

  .btn-del { background: none; border: none; cursor: pointer; color: #aaa; font-size: 14px; padding: 3px 7px; border-radius: 5px; }
  .btn-del:hover { color: #a32d2d; background: #fcebeb; }

  .empty { padding: 2.5rem; text-align: center; color: #aaa; font-size: 14px; }

  .footer-total { display: flex; justify-content: flex-end; align-items: center; gap: 8px; padding: 11px 14px; border-top: 0.5px solid #e0dfd8; background: #fafaf8; }
  .footer-total span { font-size: 13px; color: #888780; }
  .footer-total strong { font-size: 15px; font-weight: 500; color: #a32d2d; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr 1fr; }
    .summary-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>가계부</h1>

  <div class="summary-grid">
    <div class="card">
      <div class="card-label">총 지출</div>
      <div class="card-value danger" id="total">₩0</div>
    </div>
    <div class="card">
      <div class="card-label">이번 달 지출</div>
      <div class="card-value" id="monthly">₩0</div>
    </div>
    <div class="card">
      <div class="card-label">기록 건수</div>
      <div class="card-value" id="count">0건</div>
    </div>
  </div>

  <div class="form-section">
    <div class="form-grid">
      <div>
        <label class="field-label">날짜</label>
        <input type="date" id="inp-date" />
      </div>
      <div>
        <label class="field-label">항목</label>
        <input type="text" id="inp-item" placeholder="예: 점심, 지하철" />
      </div>
      <div>
        <label class="field-label">금액 (원)</label>
        <input type="number" id="inp-amount" placeholder="0" min="0" />
      </div>
      <div>
        <label class="field-label">카테고리</label>
        <select id="inp-cat">
          <option>식비</option>
          <option>교통</option>
          <option>쇼핑</option>
          <option>의료</option>
          <option>문화</option>
          <option>기타</option>
        </select>
      </div>
    </div>
    <button class="btn-add" onclick="addEntry()">+ 추가</button>
  </div>

  <div class="filter-row">
    <span>필터</span>
    <select id="filter-cat" onchange="render()">
      <option value="">전체 카테고리</option>
      <option>식비</option><option>교통</option><option>쇼핑</option>
      <option>의료</option><option>문화</option><option>기타</option>
    </select>
    <select id="filter-month" onchange="render()">
      <option value="">전체 기간</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-date">날짜</th>
          <th class="col-cat">카테고리</th>
          <th class="col-item">항목</th>
          <th class="col-amt">금액</th>
          <th class="col-del"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="footer-total">
      <span>표시된 합계</span>
      <strong id="filtered-total">₩0</strong>
    </div>
  </div>
</div>

<script>
  let entries = JSON.parse(localStorage.getItem('hb-v2') || '[]');

  function save() {
    try { localStorage.setItem('hb-v2', JSON.stringify(entries)); } catch(e) {}
  }

  function fmt(n) {
    return '₩' + Math.round(n).toLocaleString('ko-KR');
  }

  function addEntry() {
    const date   = document.getElementById('inp-date').value;
    const item   = document.getElementById('inp-item').value.trim();
    const amount = parseFloat(document.getElementById('inp-amount').value);
    const cat    = document.getElementById('inp-cat').value;

    if (!date)              { alert('날짜를 입력하세요.'); return; }
    if (!item)              { alert('항목을 입력하세요.'); return; }
    if (!amount || amount <= 0) { alert('올바른 금액을 입력하세요.'); return; }

    entries.unshift({ id: Date.now(), date, item, amount, cat });
    save();
    document.getElementById('inp-item').value   = '';
    document.getElementById('inp-amount').value = '';
    updateMonthFilter();
    render();
  }

  function deleteEntry(id) {
    if (!confirm('이 항목을 삭제할까요?')) return;
    entries = entries.filter(e => e.id !== id);
    save();
    updateMonthFilter();
    render();
  }

  function updateMonthFilter() {
    const sel = document.getElementById('filter-month');
    const cur = sel.value;
    const months = [...new Set(entries.map(e => e.date.slice(0,7)))].sort().reverse();
    sel.innerHTML = '<option value="">전체 기간</option>' +
      months.map(m => {
        const [y, mo] = m.split('-');
        return `<option value="${m}" ${m === cur ? 'selected' : ''}>${y}년 ${parseInt(mo)}월</option>`;
      }).join('');
  }

  function render() {
    const catF = document.getElementById('filter-cat').value;
    const monF = document.getElementById('filter-month').value;
    const filtered = entries.filter(e =>
      (!catF || e.cat === catF) && (!monF || e.date.startsWith(monF))
    );

    const total   = entries.reduce((s, e) => s + e.amount, 0);
    const now     = new Date();
    const ym      = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const monthly = entries.filter(e => e.date.startsWith(ym)).reduce((s, e) => s + e.amount, 0);
    const filteredTotal = filtered.reduce((s, e) => s + e.amount, 0);

    document.getElementById('total').textContent          = fmt(total);
    document.getElementById('monthly').textContent        = fmt(monthly);
    document.getElementById('count').textContent          = entries.length + '건';
    document.getElementById('filtered-total').textContent = fmt(filteredTotal);

    const tbody = document.getElementById('tbody');
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">기록이 없습니다. 지출을 추가해보세요.</td></tr>';
      return;
    }
    tbody.innerHTML = filtered.map(e => `
      <tr>
        <td>${e.date}</td>
        <td><span class="badge badge-${e.cat}">${e.cat}</span></td>
        <td>${e.item}</td>
        <td class="amount">${fmt(e.amount)}</td>
        <td style="text-align:center;"><button class="btn-del" onclick="deleteEntry(${e.id})" title="삭제">✕</button></td>
      </tr>
    `).join('');
  }

  document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];
  ['inp-item', 'inp-amount'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') addEntry();
    });
  });

  updateMonthFilter();
  render();
</script>
</body>
</html>
